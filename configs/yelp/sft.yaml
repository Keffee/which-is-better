paths:
  base_model_path: models/Qwen3.5-4B
  item_titles_path: data/processed/yelp/item_texts.json
  data_dir: data/processed/yelp
  cache_dir: outputs/yelp/sft/cache
  output_dir: outputs/yelp/sft/outputs/qwen35_4b_yelp_itemtext_sft
  logging_dir: outputs/yelp/sft/logs/qwen35_4b_yelp_itemtext_sft
  results_dir: outputs/yelp/sft/results
training:
  seed: 42
  max_length: 768
  max_train_samples: 50000
  max_eval_samples: 5000
  preprocess_num_proc: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  num_train_epochs: 1
  max_steps: 600
  learning_rate: 1.0e-05
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  logging_steps: 20
  eval_steps: 100
  save_steps: 100
  save_total_limit: 2
  dataloader_num_workers: 0
  gradient_checkpointing: true
  bf16: true
  fp16: false
  tf32: true
  optimizer: adamw_torch_fused
  attn_implementation: sdpa
  auto_find_batch_size: false
  early_stopping_patience: 2
  resume_from_checkpoint: null
  lora:
    use_lora: true
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    lora_bias: none
    task_type: CAUSAL_LM
evaluation:
  checkpoint_path: outputs/yelp/sft/outputs/qwen35_4b_yelp_itemtext_sft/best_model
  batch_size: 4
  embedding_batch_size: 16
  title_max_length: 96
  max_new_tokens: 32
  num_beams: 1
  k_values: [1, 5, 10, 20]
